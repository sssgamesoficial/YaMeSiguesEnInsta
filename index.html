<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sígueme</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: white;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    color: #333;
    font-family: 'Pacifico', cursive;
    margin: 25px 0;
    font-size: 32px;
    text-align: center;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<h1>Sígueme en Instagram 💛</h1>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.85;

const img = new Image();
img.src = "imagen.png";

let puntos = [];

img.onload = () => {

  const scale = Math.min(
    canvas.width / img.width,
    canvas.height / img.height
  );

  const w = img.width * scale;
  const h = img.height * scale;

  const offsetX = (canvas.width - w) / 2;
  const offsetY = (canvas.height - h) / 2;

  ctx.drawImage(img, offsetX, offsetY, w, h);

  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const centroX = canvas.width / 2;
  const centroY = canvas.height / 2;

  for (let i = 0; i < canvas.width; i += 5) {
    for (let j = 0; j < canvas.height; j += 5) {

      const index = (j * canvas.width + i) * 4;

      const r = data.data[index];
      const g = data.data[index + 1];
      const b = data.data[index + 2];
      const a = data.data[index + 3];

      // 🔥 FILTRO MEJORADO PARA FONDO COLORIDO
      const brillo = (r + g + b) / 3;
      const esFondo = brillo > 220 || a < 50;

      if (!esFondo) {
        puntos.push({
          xFinal: i,
          yFinal: j,
          x: centroX,
          y: centroY,
          color: `rgb(${r},${g},${b})`,
          velocidad: Math.random() * 0.05 + 0.02
        });
      }
    }
  }
};

// animación mágica desde el centro
function animar() {
  requestAnimationFrame(animar);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  puntos.forEach(p => {

    // interpolación suave
    p.x += (p.xFinal - p.x) * p.velocidad;
    p.y += (p.yFinal - p.y) * p.velocidad;

    ctx.fillStyle = p.color;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

animar();
</script>

</body>
</html>
