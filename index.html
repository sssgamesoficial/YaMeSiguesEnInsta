<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sígueme</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: white;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    color: #333;
    font-family: 'Pacifico', cursive;
    margin: 25px 0;
    font-size: 34px;
    text-align: center;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<h1>Sígueme en Instagram perro</h1>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.85;

const img = new Image();
img.src = "imagen.png";

let puntos = [];
let tiempo = 0;
let fase = "polvo"; // polvo -> formar

img.onload = () => {

  const scale = Math.min(
    canvas.width / img.width,
    canvas.height / img.height
  );

  const w = img.width * scale;
  const h = img.height * scale;

  const offsetX = (canvas.width - w) / 2;
  const offsetY = (canvas.height - h) / 2;

  ctx.drawImage(img, offsetX, offsetY, w, h);

  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < canvas.width; i += 5) {
    for (let j = 0; j < canvas.height; j += 5) {

      const index = (j * canvas.width + i) * 4;

      const r = data.data[index];
      const g = data.data[index + 1];
      const b = data.data[index + 2];
      const a = data.data[index + 3];

      const brillo = (r + g + b) / 3;
      const esFondo = brillo > 220 || a < 50;

      if (!esFondo) {
        puntos.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          xFinal: i,
          yFinal: j,
          color: `rgb(${r},${g},${b})`,
          vx: Math.random() * 2 - 1,
          vy: Math.random() * 2 - 1
        });
      }
    }
  }
};

// animación
function animar() {
  requestAnimationFrame(animar);

  tiempo++;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ⏳ cambiar fase después de un tiempo
  if (tiempo > 120) {
    fase = "formar";
  }

  puntos.forEach(p => {

    if (fase === "polvo") {
      // 🌫️ movimiento libre tipo polvo
      p.x += p.vx;
      p.y += p.vy;

      // rebote suave en bordes
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    } else {
      // ✨ formar imagen (magia)
      p.x += (p.xFinal - p.x) * 0.05;
      p.y += (p.yFinal - p.y) * 0.05;
    }

    ctx.fillStyle = p.color;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

animar();
</script>

</body>
</html>
